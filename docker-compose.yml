services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend
