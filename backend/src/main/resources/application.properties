spring.application.name=careercompass-ai
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
server.port=${PORT:8080}

# Database - uses H2 by default for dev, PostgreSQL via env vars for production
spring.datasource.url=${DATABASE_URL:${JDBC_DATABASE_URL:jdbc:h2:mem:careercompass}}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.demo.jwt-secret=${JWT_SECRET:careercompass-demo-secret}
gemini.api.key=${GEMINI_API_KEY:}
